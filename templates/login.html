<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — NtandoMods</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{width:64px;height:64px;background:#e94560;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px}
    .logo h1{font-size:22px;font-weight:800;color:#1a1a2e}
    .logo p{font-size:13px;color:#888;margin-top:4px}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:7px}
    input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s}
    input:focus{border-color:#e94560}
    .btn{width:100%;padding:13px;background:#e94560;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .error{background:#fff0f0;border:1px solid #f5c6c6;color:#c0392b;padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;text-align:center}
    .back{text-align:center;margin-top:20px}
    .back a{color:#888;font-size:13px;text-decoration:none}
    .back a:hover{color:#e94560}
    .lock{text-align:center;font-size:48px;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏫</div>
      <h1>NtandoMods</h1>
      <p>Admin — Course Downloads</p>
    </div>
    <div class="lock">🔐</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="back"><a href="/">← Back to website</a></div>
  </div>
</body>
</html>
