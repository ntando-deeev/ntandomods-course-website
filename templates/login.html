<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login - NtandoMods | Angle of Health Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f2850 0%,#1a3a6b 60%,#1e4d8a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
    .logo{text-align:center;margin-bottom:32px}
    .logo img{width:72px;height:72px;border-radius:16px;object-fit:contain;margin-bottom:12px;background:#f0f9f4;padding:6px}
    .logo h1{font-size:22px;font-weight:800;color:#1a3a6b}
    .logo p{font-size:13px;color:#64748b;margin-top:4px}
    .logo .trust{font-size:11px;color:#16a34a;font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:7px}
    input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
    input:focus{border-color:#16a34a}
    .btn{width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
    .btn:hover{background:#15803d}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;text-align:center}
    .back{text-align:center;margin-top:20px}
    .back a{color:#64748b;font-size:13px;text-decoration:none}
    .back a:hover{color:#16a34a}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/logo.jpg" alt="Angle of Health Trust"/>
      <h1>NtandoMods</h1>
      <p>Admin - Course Downloads</p>
      <div class="trust">Angle of Health Trust</div>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="back"><a href="/">&larr; Back to website</a></div>
  </div>
</body>
</html>
